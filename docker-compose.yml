services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rvl
      POSTGRES_PASSWORD: rvl
      POSTGRES_DB: rvl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: rvl
      MONGO_INITDB_ROOT_PASSWORD: rvl
      MONGO_INITDB_DATABASE: rvl
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:

